name: BodyOS

options:
  bundleIdPrefix: com.jamestran.bodyos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_LANGUAGE: en
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  BodyOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: BodyOS
        excludes:
          - "Resources/Info.plist.template"
          - "Resources/Secrets.plist"
          - "Resources/Secrets.plist.example"
          - "DesignSystem/Fonts/README.md"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamestran.bodyos
        PRODUCT_NAME: BodyOS
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BodyOS/Resources/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ZDFV9C3CA9
        CODE_SIGN_ENTITLEMENTS: BodyOS/Resources/BodyOS.entitlements

    entitlements:
      path: BodyOS/Resources/BodyOS.entitlements
      properties:
        com.apple.developer.healthkit: true

    info:
      path: BodyOS/Resources/Info.plist
      properties:
        CFBundleDisplayName: BodyOS
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSHealthShareUsageDescription: "BodyOS reads your sleep, steps, heart rate, and weight to give you one useful recommendation per day."
        NSHealthUpdateUsageDescription: "BodyOS does not write to Apple Health yet."
        NSCameraUsageDescription: "BodyOS uses your camera to log meals from photos."
        NSPhotoLibraryUsageDescription: "BodyOS lets you pick meal photos from your library to log food."
        UIAppFonts:
          - InstrumentSerif-Regular.ttf
          - Geist-Regular.ttf
          - Geist-Medium.ttf
          - JetBrainsMono-Regular.ttf

  BodyOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BodyOSTests
    dependencies:
      - target: BodyOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamestran.bodyos.tests
