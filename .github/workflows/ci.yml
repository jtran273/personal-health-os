name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  root-checks:
    name: Root checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  ios-tests:
    name: iOS generated project and tests
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Regenerate project, verify secrets exclusion, and run iOS tests
        run: scripts/ci-ios.sh
